{% extends 'orders/base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ title }}</h1>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Наименование</label>
                    {{ form.name }}
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Описание</label>
                    {{ form.description }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Базовая стоимость материалов (руб. за ед.)</label>
                    {{ form.base_material_cost }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Норма времени (часы)</label>
                    {{ form.base_time_norm_hours }}
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>
    </div>
</div>
{% endblock %}
